site_name: Machine Learning
site_description: M9 Machine Learning Module - BPP University School of Technology
site_url: https://bpp-sot.github.io/l6ds-m9-machine-learning/
repo_url: https://github.com/bpp-sot/l6ds-m9-machine-learning
repo_name: bpp-sot/l6ds-m9-machine-learning

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/bpp-logo.svg
  favicon: assets/bpp-logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

